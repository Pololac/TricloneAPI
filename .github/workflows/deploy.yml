name: Test and deploy Triclone API to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: deploy-triclone-api-production
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: examapi_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # src/main/resources/env.properties is gitignored (real credentials live there
      # locally). The CI runner needs the same file present, pointed at the MySQL
      # service container above, since application.properties imports it directly.
      - name: Write env.properties for CI
        run: |
          cat > src/main/resources/env.properties << 'EOF'
          spring.datasource.username=root
          spring.datasource.password=root
          EOF

      - name: Run tests
        run: ./mvnw -B test
        env:
          SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/examapi_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"

      - name: Build jar
        run: ./mvnw -B package -DskipTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: triclone-api-jar
          path: target/*.jar
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: triclone-api-jar
          path: target

      - name: Copy jar to VPS staging path
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar"
          target: "${{ secrets.TRICLONE_API_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            PROJECT_PATH="${{ secrets.TRICLONE_API_PATH }}"
            SERVICE_NAME="${{ secrets.TRICLONE_API_SERVICE }}"

            echo "Pointing app.jar at the newly uploaded build..."
            cd "$PROJECT_PATH"
            JAR_NAME=$(ls -t *.jar | head -n 1)
            ln -sf "$JAR_NAME" app.jar

            echo "Restarting Triclone API service..."
            sudo systemctl restart "$SERVICE_NAME"

            sleep 5
            sudo systemctl is-active --quiet "$SERVICE_NAME" || (
              echo "Service failed to start"
              sudo journalctl -u "$SERVICE_NAME" --no-pager -n 30
              exit 1
            )

            echo "Deployment successful"
